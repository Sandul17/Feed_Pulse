services:
  mongodb:
    image: mongo:7
    container_name: feedpulse-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
    container_name: feedpulse-backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/feed_pulse
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: feedpulse-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
